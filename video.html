<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victor Remy — Vidéo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Space+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=1784304086">
</head>
<body>

<nav class="top-nav-minimal">
  <a href="#" data-modal="contact">Contact</a>
  <a href="index.html" class="brand">Victor Remy</a>
  <a href="#" data-modal="apropos">À propos</a>
</nav>
<p class="path-breadcrumb" id="path-text">hub/video</p>
<button class="retour-btn" data-retour>← Retour</button>

<div id="zoom-stage" class="zoom-stage">
<canvas id="syphon-bg" class="syphon-field-canvas"></canvas>
<div id="syphon-field" class="syphon-field"></div>
</div>

<script src="js/branches-config.js?v=1784304086"></script>
<script src="js/main.js?v=1784304086"></script>
<script>
  initParticleField("syphon-bg");
  initZoomTransitions();
  initInfoBubbles();
  initWheelZoom();
  bindRetourButton();

  loadLayoutData().then(() => {
    const tree = getChildren("video").map(cKey => ({
      label: BRANCHES[cKey].label,
      href: BRANCHES[cKey].page,
      key: cKey,
      children: []
    }));
    renderSyphonTree("syphon-field", tree);
    initEditMode();
  });
</script>

</body>
</html>
