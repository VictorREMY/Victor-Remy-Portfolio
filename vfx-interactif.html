<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victor Remy — vfx-interactif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Space+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="top-nav-minimal">
  <a href="#" data-modal="contact">Contact</a>
  <a href="index.html" class="brand">Victor Remy</a>
  <a href="#" data-modal="apropos">À propos</a>
</nav>
<p class="path-breadcrumb" id="path-text">hub/vfx/interactif</p>
<button class="retour-btn" data-retour>← Retour</button>

<div id="zoom-stage" class="zoom-stage">
<canvas id="syphon-bg" class="syphon-field-canvas"></canvas>
<svg id="syphon-connectors" class="syphon-connectors" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
<div id="syphon-field" class="syphon-field"></div>
</div>

<script src="js/branches-config.js"></script>
<script src="js/main.js"></script>
<script>
  initParticleField("syphon-bg");
  initZoomTransitions();
  initInfoBubbles();
  initWheelZoom();
  bindRetourButton();
  loadProjectsData().then(() => {
    const items = getProjectsByTag("vfx-interactif").map(p => ({ label: p.title, href: "projet.html?id=" + p.id }));
    renderSyphons("syphon-field", items);
  });
</script>

</body>
</html>
