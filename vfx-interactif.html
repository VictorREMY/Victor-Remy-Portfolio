<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="stylesheet" href="css/style.css?v=1784474434">
</head>
<body>

<div id="water-bg"></div>

<nav class="top-nav-minimal">
  <a href="#" data-modal="contact">Contact</a>
  <a href="index.html" class="brand">Victor Remy</a>
  <a href="#" data-modal="apropos">À propos</a>
</nav>
<p class="path-breadcrumb" id="path-text">hub/vfx/interactif</p>
<button class="retour-btn" data-retour>← Retour</button>

<div id="zoom-stage" class="zoom-stage">
<div id="syphon-field" class="syphon-field"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/branches-config.js?v=1784474434"></script>
<script src="js/main.js?v=1784474434"></script>
<script>
  initZoomTransitions();
  initInfoBubbles();
  initProjectPopups();
  initWheelZoom();
  bindRetourButton();

  Promise.all([loadLayoutData(), loadProjectsData()]).then(() => {
    const items = getProjectsByTag("vfx-interactif").map(p => ({ label: p.title, href: "projet.html?id=" + p.id, key: p.id, popup: true, thumbnail: p.thumbnail || null, contextTag: "vfx-interactif" }));
    renderSyphons("syphon-field", items);
    initEditMode();
  });
</script>

<script type="importmap">
{
  "imports": {
    "three": "./js/vendor/three.module.js",
    "lil-gui": "./js/vendor/lil-gui.esm.js"
  }
}
</script>
<script type="module">
  import { initWaterEffect } from './js/water-effect.js';
  initWaterEffect(document.getElementById('water-bg'));
</script>
