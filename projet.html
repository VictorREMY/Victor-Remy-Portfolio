<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Victor Remy — Projet</title>
<link rel="stylesheet" href="css/style.css?v=1784638036">
</head>
<body class="project-sober-bg">

<nav class="top-nav-minimal">
  <a href="#" data-modal="contact">Contact</a>
  <a href="index.html" class="brand">Victor Remy</a>
  <a href="#" data-modal="apropos">À propos</a>
</nav>
<p class="path-breadcrumb" id="path-text"></p>
<button class="retour-btn" data-retour>← Retour</button>

<main class="page" id="project-detail" style="max-width: 1000px;">
  <!-- Rempli automatiquement par renderProjectDetail() selon ?id=... dans l'URL -->
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="js/branches-config.js?v=1784638036"></script>
<script src="js/main.js?v=1784638036"></script>
<script>
  initInfoBubbles();

  Promise.all([loadProjectsData(), loadChapterLayouts()]).then(() => {
    renderProjectDetail("project-detail", "path-text");
    const container = document.getElementById("project-detail");
    mountBlockCanvases(container);

    const params = new URLSearchParams(window.location.search);
    if(params.get("edit") === "1"){
      const project = PROJECTS.find(p => p.id === params.get("id"));
      if(project) initChapterEditor(project);
    }
  });

  // Fond statique ici : le retour n'a pas besoin de l'effet zoom, juste l'historique
  document.querySelector("[data-retour]").addEventListener("click", (e) => {
    e.preventDefault();
    window.history.back();
  });
</script>

</body>
</html>
